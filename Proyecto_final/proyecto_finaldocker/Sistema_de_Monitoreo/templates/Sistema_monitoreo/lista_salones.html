<!DOCTYPE html>
<html>
    <head>
        <title>Salones</title>
    </head>
<body>
    <h1>Lista de Salones</h1>
    <table border="1">
        <tr>
            <th>Nombre</th>
            <th>Edificio</th>
            <th>Capacidad</th>
        </tr>
        {% for salon in salones %}
        <tr>
            <td>{{ salon.nombre }}</td>
            <td>{{ salon.edificio }}</td>
            <td>{{ salon.capacidad }}</td>
        </tr>
        {% endfor %}
    </table>
    
</body>
</html>
